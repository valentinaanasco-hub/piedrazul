server.port=8081
spring.application.name=identity-service


# --- RabbitMq ---
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=piedrazul
spring.rabbitmq.password=piedrazul_pass

# --- Base de datos ---
spring.datasource.url=jdbc:postgresql://localhost:5432/identity_db
spring.datasource.username=identity_user
spring.datasource.password=identity_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA ---
# validate: verifica que las entidades coincidan con la BD sin modificarla
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Swagger ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
