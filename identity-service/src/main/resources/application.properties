server.port=8081
spring.application.name=identity-service

# --- Base de datos ---
spring.datasource.url=jdbc:postgresql://localhost:5432/piedrazul
spring.datasource.username=piedrazul_user
spring.datasource.password=piedrazul_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA ---
# validate: verifica que las entidades coincidan con la BD sin modificarla
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Swagger ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
