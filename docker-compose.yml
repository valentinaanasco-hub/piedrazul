services:

  # ── Base de datos — Identity Service ──────────────────────
  postgres-identity:
    image: postgres:16-alpine
    container_name: postgres-identity
    restart: unless-stopped
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: identity_user
      POSTGRES_PASSWORD: identity_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_identity_data:/var/lib/postgresql/data
      - ./docker/postgres/init-identity.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - piedrazul-network

  # ── Base de datos — Patient Service ───────────────────────
  postgres-patient:
    image: postgres:16-alpine
    container_name: postgres-patient
    restart: unless-stopped
    environment:
      POSTGRES_DB: patient_db
      POSTGRES_USER: patient_user
      POSTGRES_PASSWORD: patient_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_patient_data:/var/lib/postgresql/data
      - ./docker/postgres/init-patient.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - piedrazul-network

  # ── Base de datos — Medical Staff Service ─────────────────
  postgres-medical:
    image: postgres:16-alpine
    container_name: postgres-medical
    restart: unless-stopped
    environment:
      POSTGRES_DB: medical_db
      POSTGRES_USER: medical_user
      POSTGRES_PASSWORD: medical_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres_medical_data:/var/lib/postgresql/data
      - ./docker/postgres/init-medical.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - piedrazul-network

  # ── Base de datos — Appointment Service ───────────────────
  postgres-appointment:
    image: postgres:16-alpine
    container_name: postgres-appointment
    restart: unless-stopped
    environment:
      POSTGRES_DB: appointment_db
      POSTGRES_USER: appointment_user
      POSTGRES_PASSWORD: appointment_pass
    ports:
      - "5435:5432"
    volumes:
      - postgres_appointment_data:/var/lib/postgresql/data
      - ./docker/postgres/init-appointment.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - piedrazul-network

  # ── Redis — caché de usuarios para appointment-service ────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - piedrazul-network

  # ── RabbitMQ ──────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"   # Puerto para comunicacion entre servicios
      - "15672:15672" # Puerto para visualizacion de rabbitMQ en web
    environment:
      RABBITMQ_DEFAULT_USER: piedrazul
      RABBITMQ_DEFAULT_PASS: piedrazul_pass
    networks:
      - piedrazul-network

  # ── Identity Service ──────────────────────────────────────
  identity-service:
    build:
      context: .
      dockerfile: identity-service/Dockerfile
    container_name: identity-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-identity:5432/identity_db
      SPRING_DATASOURCE_USERNAME: identity_user
      SPRING_DATASOURCE_PASSWORD: identity_pass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: piedrazul
      SPRING_RABBITMQ_PASSWORD: piedrazul_pass
    ports:
      - "8081:8081"
    depends_on:
      - postgres-identity
      - rabbitmq
    networks:
      - piedrazul-network

  # ── Medical Staff Service ─────────────────────────────────
  medical-staff-service:
    build:
      context: .
      dockerfile: medical-staff-service/Dockerfile
    container_name: medical-staff-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-medical:5432/medical_db
      SPRING_DATASOURCE_USERNAME: medical_user
      SPRING_DATASOURCE_PASSWORD: medical_pass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: piedrazul
      SPRING_RABBITMQ_PASSWORD: piedrazul_pass
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8082:8082"
    depends_on:
      - postgres-medical
      - rabbitmq
      - redis
    networks:
      - piedrazul-network

  # ── Patient Service ───────────────────────────────────────
  patient-service:
    build: ./patient-service
    container_name: patient-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-patient:5432/patient_db
      SPRING_DATASOURCE_USERNAME: patient_user
      SPRING_DATASOURCE_PASSWORD: patient_pass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: piedrazul
      SPRING_RABBITMQ_PASSWORD: piedrazul_pass
    ports:
      - "8083:8083"
    depends_on:
      - postgres-patient
      - rabbitmq
    networks:
      - piedrazul-network

  # ── Appointment Service ───────────────────────────────────
  appointment-service:
    build:
      context: .
      dockerfile: appointment-service/Dockerfile
    container_name: appointment-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-appointment:5432/appointment_db
      SPRING_DATASOURCE_USERNAME: appointment_user
      SPRING_DATASOURCE_PASSWORD: appointment_pass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: piedrazul
      SPRING_RABBITMQ_PASSWORD: piedrazul_pass
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8084:8084"
    depends_on:
      - postgres-appointment
      - rabbitmq
      - redis
    networks:
      - piedrazul-network

  # ── API Gateway ───────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8090:8090"
    depends_on:
      - identity-service
      - medical-staff-service
      - patient-service
      - appointment-service
      - rabbitmq
    networks:
      - piedrazul-network

volumes:
  postgres_identity_data:
  postgres_patient_data:
  postgres_medical_data:
  postgres_appointment_data:

networks:
  piedrazul-network:
    driver: bridge
