version: '3.8'

services:

  # ── Base de datos compartida (por ahora) ──────────────────
  postgres:
    image: postgres:16-alpine
    container_name: piedrazul-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: piedrazul
      POSTGRES_USER: piedrazul_user
      POSTGRES_PASSWORD: piedrazul_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - piedrazul-network

  # ── RabbitMQ ──────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672" # Puerto para comunicacion entre servicios
      - "15672:15672" # Puerto para visualizacion de rabbitMQ(Colas...) en web
    environment:
      RABBITMQ_DEFAULT_USER: piedrazul
      RABBITMQ_DEFAULT_PASS: piedrazul_pass
    networks:
      - piedrazul-network

  # ── Identity Service ──────────────────────────────────────
  identity-service:
    build: ./identity-service
    container_name: identity-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/piedrazul
      SPRING_DATASOURCE_USERNAME: piedrazul_user
      SPRING_DATASOURCE_PASSWORD: piedrazul_pass
      SPRING_RABBITMQ_HOST: rabbitmq     
      SPRING_RABBITMQ_USERNAME: piedrazul
      SPRING_RABBITMQ_PASSWORD: piedrazul_pass
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - piedrazul-network

  # ── Medical Staff Service ─────────────────────────────────
  medical-staff-service:
    build: ./medical-staff-service
    container_name: medical-staff-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/piedrazul
      SPRING_DATASOURCE_USERNAME: piedrazul_user
      SPRING_DATASOURCE_PASSWORD: piedrazul_pass
      SPRING_RABBITMQ_HOST: rabbitmq     
      SPRING_RABBITMQ_USERNAME: piedrazul
      SPRING_RABBITMQ_PASSWORD: piedrazul_pass
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - piedrazul-network

  # ── Patient Service ───────────────────────────────────────
  patient-service:
    build: ./patient-service
    container_name: patient-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/piedrazul
      SPRING_DATASOURCE_USERNAME: piedrazul_user
      SPRING_DATASOURCE_PASSWORD: piedrazul_pass
      SPRING_RABBITMQ_HOST: rabbitmq     
      SPRING_RABBITMQ_USERNAME: piedrazul
      SPRING_RABBITMQ_PASSWORD: piedrazul_pass
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - piedrazul-network

  # ── Appointment Service ───────────────────────────────────
  appointment-service:
    build: ./appointment-service
    container_name: appointment-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/piedrazul
      SPRING_DATASOURCE_USERNAME: piedrazul_user
      SPRING_DATASOURCE_PASSWORD: piedrazul_pass
      SPRING_RABBITMQ_HOST: rabbitmq     
      SPRING_RABBITMQ_USERNAME: piedrazul
      SPRING_RABBITMQ_PASSWORD: piedrazul_pass
    ports:
      - "8084:8084"
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - piedrazul-network

  # ── API Gateway ───────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8090:8090"
    depends_on:
      - identity-service
      - medical-staff-service
      - patient-service
      - appointment-service
      - rabbitmq
    networks:
      - piedrazul-network

volumes:
  postgres_data:

networks:
  piedrazul-network:
    driver: bridge
